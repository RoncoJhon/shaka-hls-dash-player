<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shaka-hls-dash-player — Minimal Example</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .player-container {
            width: min(960px, 100%);
            aspect-ratio: 16 / 9;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
    </style>

    <!-- Load the web component -->
    <script src="./shaka-hls-dash-player.js"></script>
</head>
<body>
    <div class="player-container">
        <!--
            Minimal usage: just set base-url to your video folder.
            The component auto-discovers manifests, poster, preview,
            thumbnails, and subtitles from the folder structure.

            See README.md for all available attributes.
        -->
        <shaka-hls-dash-player
            base-url="https://cdn.roncodev.com/demo-video/"
        ></shaka-hls-dash-player>
    </div>
</body>
</html>
